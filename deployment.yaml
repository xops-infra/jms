# 示例 Kubernetes 清单（开源公式）：请按集群替换 namespace、storageClassName、镜像、
# hostPath、资源配额与 nodeSelector 等后再 kubectl apply。
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jms-ssh-pvc
  namespace: jms

spec:
  accessModes:
    - ReadWriteOnce
  # 改为集群内实际 StorageClass，例如 standard / nfs-client 等
  storageClassName: standard
  resources:
    requests:
      storage: 80Gi
---
apiVersion: v1
kind: Service
metadata:
  name: jms-api-svc
  namespace: jms

spec:
  ports:
    - port: 6060
      targetPort: 6060
      protocol: TCP
      name: pprof
    - port: 8013
      targetPort: 8013
      protocol: TCP
      name: api
  type: NodePort
  selector:
    app: jms-api
---
apiVersion: v1
kind: Service
metadata:
  name: jms-sshd-svc
  namespace: jms

spec:
  ports:
    - port: 22222
      targetPort: 22222
      protocol: TCP
      name: ssh
    - port: 6060
      targetPort: 6060
      protocol: TCP
      name: pprof
  type: NodePort
  selector:
    app: jms-sshd
---
apiVersion: v1
kind: Service
metadata:
  name: jms-web-svc
  namespace: jms

spec:
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
  type: NodePort
  selector:
    app: jms-web
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: jms-web-nginx
  namespace: jms

data:
  default.conf: |
    server {
        listen 80;
        server_name _;
        client_max_body_size 64m;

        root /usr/share/nginx/html;
        index index.html;

        location /api/v1/terminal/ws {
            proxy_pass http://jms-api-svc:8013;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location /api/ {
            proxy_pass http://jms-api-svc:8013;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            try_files $uri /index.html;
        }
    }
---
# jms-api
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jms-api
  namespace: jms
  labels:
    app: jms-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jms-api
  template:
    metadata:
      labels:
        app: jms-api
    spec:
      containers:
        - name: jms-api
          # 构建并推送到你的镜像仓库后修改
          image: registry.example.com/jms:latest
          imagePullPolicy: Always
          env:
            - name: API
              value: "true"
          volumeMounts:
            - mountPath: /opt/jms/config.yaml
              subPath: config.yaml
              name: jms-config-volume
              readOnly: true
          resources:
            limits:
              cpu: 1
              memory: 1Gi
            requests:
              cpu: 0.1
              memory: 256Mi
          ports:
            - name: api
              containerPort: 8013
              protocol: TCP
            - name: pprof
              containerPort: 6060
              protocol: TCP
      volumes:
        - name: jms-config-volume
          configMap:
            name: jms-config
---
# jms-web
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jms-web
  namespace: jms
  labels:
    app: jms-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jms-web
  template:
    metadata:
      labels:
        app: jms-web
    spec:
      containers:
        - name: jms-web
          image: registry.example.com/jms:latest
          imagePullPolicy: Always
          env:
            - name: WEB
              value: "true"
          volumeMounts:
            - mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              name: jms-web-nginx-volume
              readOnly: true
          resources:
            limits:
              cpu: 1
              memory: 512Mi
            requests:
              cpu: 0.1
              memory: 128Mi
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
      volumes:
        - name: jms-web-nginx-volume
          configMap:
            name: jms-web-nginx
---
# jms-sshd
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jms-sshd
  namespace: jms
  labels:
    app: jms-sshd
spec:
  replicas: 4
  selector:
    matchLabels:
      app: jms-sshd
  template:
    metadata:
      labels:
        app: jms-sshd
    spec:
      containers:
        - name: jms-sshd
          image: registry.example.com/jms:latest
          imagePullPolicy: Always
          env:
            - name: WITH_SSH_CHECK
              value: "true"
            - name: SSH_DIR
              value: /opt/jms/.ssh/
            - name: JMS_SCP_DIR
              value: /opt/jms/
          volumeMounts:
            - mountPath: /opt/jms/
              name: ssh-volume
            - mountPath: /opt/logs/
              name: logs-volume
            - mountPath: /opt/jms/config.yaml
              subPath: config.yaml
              name: jms-config-volume
          resources:
            limits:
              cpu: 1
              memory: 3Gi
            requests:
              cpu: 0.1
              memory: 1Gi
          ports:
            - name: ssh
              containerPort: 22222
              protocol: TCP
            - name: pprof
              containerPort: 6060
              protocol: TCP
      volumes:
        - name: jms-config-volume
          configMap:
            name: jms-config
        - name: ssh-volume
          persistentVolumeClaim:
            claimName: jms-ssh-pvc
        - name: logs-volume
          hostPath:
            # 按节点实际日志目录修改；生产环境建议用 PVC 或 sidecar 采集
            path: /var/log/jms/sshd
---
# jms-scheduler
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jms-scheduler
  namespace: jms
  labels:
    app: jms-scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jms-scheduler
  template:
    metadata:
      labels:
        app: jms-scheduler
    spec:
      containers:
        - name: jms-scheduler
          image: registry.example.com/jms:latest
          imagePullPolicy: Always
          env:
            - name: SCHEDULER
              value: "true"
            - name: SSH_DIR
              value: /opt/jms/.ssh/
          volumeMounts:
            - mountPath: /opt/jms/
              name: ssh-volume
            - mountPath: /opt/logs/
              name: logs-volume
            - mountPath: /opt/jms/config.yaml
              subPath: config.yaml
              name: jms-config-volume
              readOnly: true
      volumes:
        - name: jms-config-volume
          configMap:
            name: jms-config
        - name: ssh-volume
          persistentVolumeClaim:
            claimName: jms-ssh-pvc
        - name: logs-volume
          hostPath:
            path: /var/log/jms/scheduler
