version: "3"
services: 
  pg:
    image: postgres:16
    restart: always
    hostname: pg
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=jms
    ports:
      - "5432:5432"
    volumes:
      - "./data/pg:/var/lib/postgresql/data"

  jms-sshd:
    depends_on:
      - pg
    restart: always # 支持 always, on-failure, unless-stopped
    image: zhoushoujian/jms:latest
    ports: 
      - "22222:22222"
    environment:
      - TIMEOUT=1800
      - DEBUG=false
    volumes: 
      - "${JMS_CONFIG_PATH:-/opt/jms/config.yaml}:/opt/jms/config.yaml:ro"
      - "${JMS_SSH_DIR:-/opt/jms/.ssh}:/opt/jms/.ssh/" # 持久化数据

  jms-scheduler:
    depends_on:
      - pg
    restart: always
    image: zhoushoujian/jms:latest
    ports: 
      - "6060:6060"
    environment:
      - DEBUG=false
      - SCHEDULER=true
      - JMS_DINGTALK_WEB_HOOK_TOKEN=xxx # 钉钉群机器人 token (可选)
    volumes:
      - "${JMS_CONFIG_PATH:-/opt/jms/config.yaml}:/opt/jms/config.yaml:ro"

  jms-api:
    depends_on:
      - pg
    restart: always
    image: zhoushoujian/jms:latest
    ports: 
      - "8013:8013"
    environment:
      - DEBUG=false
      - API=true # true为api模式
    volumes: 
      - "${JMS_CONFIG_PATH:-/opt/jms/config.yaml}:/opt/jms/config.yaml:ro"
      - "${JMS_SSH_DIR:-/opt/jms/.ssh}:/opt/jms/.ssh/" # 持久化数据
