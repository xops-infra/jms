name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      # 集成测试 init 依赖数据库；CI 仅做编译与静态检查
      - name: Go build
        run: go build ./...
      - name: Go vet
        run: go vet ./...

  web-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install and build
        working-directory: web
        run: npm ci && npm run build

  docker-image:
    needs: [go-check, web-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Resolve tags and push
        id: meta
        env:
          DOCKER_USER: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "do_push=true" >> "$GITHUB_OUTPUT"
            DATE_TAG=$(date -u +%Y%m%d)
            SHORT_SHA="${GITHUB_SHA:0:7}"
            {
              echo 'tags<<EOF'
              echo "${DOCKER_USER}/jms:latest"
              echo "${DOCKER_USER}/jms:${GITHUB_SHA}"
              echo "${DOCKER_USER}/jms:${DATE_TAG}-${SHORT_SHA}"
              echo EOF
            } >> "$GITHUB_OUTPUT"
          else
            echo "do_push=false" >> "$GITHUB_OUTPUT"
            echo "tags=jms:ci-${GITHUB_RUN_ID}" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to Docker Hub
        if: steps.meta.outputs.do_push == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build (and push on main)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ steps.meta.outputs.do_push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
